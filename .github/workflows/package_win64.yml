name: Build Windows Installer

on:
  push:
  #  branches: [ main, master ]
    tags:
      - 'v*'
  #pull_request:
  #  branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Create virtual environment
      run: |
        python -m venv .venv
      shell: pwsh

    - name: Activate venv and install dependencies
      run: |
        .\.venv\Scripts\Activate.ps1
        python -m pip install --upgrade pip
        pip install .
      shell: pwsh

    - name: Initialize static_ffmpeg binaries
      run: |
        .\.venv\Scripts\Activate.ps1
        Write-Host "Triggering static_ffmpeg download..."
        python -c "import static_ffmpeg; static_ffmpeg.add_paths()"
      shell: pwsh

    - name: Compile language translation files
      run: |
        .\.venv\Scripts\Activate.ps1
        pyside6-lrelease translations/anaouder_fr.ts -qm translations/anaouder_fr.qm
        pyside6-lrelease translations/anaouder_br.ts -qm translations/anaouder_br.qm
      shell: pwsh

    - name: Build with PyInstaller
      run: |
        .\.venv\Scripts\Activate.ps1
        $env:PYTHONPATH = $PWD.Path
        $env:ARCH = "x86_64"
        $env:DEBUG = "False"
        pyinstaller anaouder.spec
      shell: pwsh

    - name: Verify build output
      run: |
        if (Test-Path "dist/Anaouder/Anaouder.exe") {
          Write-Host "Build successful - Anaouder.exe found"
        } else {
          Write-Error "Build failed - Anaouder.exe not found"
          exit 1
        }
      shell: pwsh

    - name: Install Inno Setup
      run: |
        choco install innosetup -y
      shell: pwsh

    - name: Build installer with Inno Setup
      run: |
        $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
        
        if ("${{ github.ref }}" -match "refs/tags/v(.+)") {
          $version = $matches[1]
        }
        
        Write-Host "Building Installer for version: $version"

        # 3. Run ISCC and pass the version as a variable
        # /DMyAppVersion overrides the #define in the script
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version "building/Windows/anaouder_installer.iss"
      shell: pwsh

    - name: Upload PyInstaller artifact
      uses: actions/upload-artifact@v4
      with:
        name: Anaouder-Windows-Portable
        path: dist/Anaouder/
        retention-days: 30

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: Anaouder-Windows-Installer
        path: building/Windows/Output/*.exe
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          building/Windows/Output/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
